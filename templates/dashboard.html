
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Control Center</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; display: flex; }
        .sidebar { width: 250px; background: #1a1a2e; color: white; height: 100vh; padding: 20px; position: fixed; }
        .sidebar h2 { color: #4e73df; }
        .nav-item { padding: 15px; cursor: pointer; border-radius: 5px; margin-bottom: 5px; }
        .nav-item:hover { background: #252545; }
        
        .main { flex: 1; margin-left: 290px; padding: 30px; }
        .stats-container { display: flex; gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 10px; flex: 1; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card h3 { margin: 0; color: #888; font-size: 14px; }
        .card p { font-size: 24px; font-weight: bold; margin: 10px 0 0; color: #333; }

        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
        th { background: #f8f9fc; padding: 15px; text-align: left; color: #4e73df; }
        td { padding: 15px; border-top: 1px solid #e3e6f0; }
        
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; background: #1cc88a; margin-right: 5px; }
        #log-feed::-webkit-scrollbar { width: 5px; }
        #log-feed::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>FaceID Admin</h2>
        <div class="nav-item" onclick="location.href='camera.html'">🏠 Live Camera</div>
        <div class="nav-item" onclick="location.href='register.html'">👤 Register User</div>
        <div class="nav-item" style="background: #252545;">📊 Dashboard</div>
    </div>

    <div class="main">
        <h1>System Overview</h1>

        <div class="stats-container">
            <div class="card">
                <h3>Total Registered</h3>
                <p id="stat-count">0</p>
            </div>
            <div class="card">
                <h3>AI Memory Status</h3>
                <p style="font-size: 16px; color: #1cc88a;"><span class="status-dot"></span>Synced</p>
                <small id="stat-time">Last update: Loading...</small>
            </div>
            <div class="card">
                <h3>System Uptime</h3>
                <p id="stat-uptime" style="font-size: 18px;">00:00:00</p>
            </div>
        </div>

        <div style="display: flex; gap: 20px;">
            <div style="flex: 2;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h3 style="margin: 0;">Registered Users</h3>
                    <input type="text" id="search-input" placeholder="Search User ID..." oninput="handleSearch()" style="padding: 8px 12px; border: 1px solid #ccc; border-radius: 5px; width: 250px;">
                </div>            
                <table>
                    <thead>
                        <tr>
                            <th>User ID</th>
                            <th>Reg. Date</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="user-table"></tbody>
                </table>
                
                <div style="margin-top: 15px; display: flex; justify-content: space-between; align-items: center;">
                    <button id="prev-btn" onclick="changePage(-1)" style="padding: 8px 15px; cursor: pointer; border: 1px solid #ccc; background: white; border-radius: 5px;">Previous</button>
                    <span id="page-indicator" style="color: #666; font-size: 14px;">Page 1</span>
                    <button id="next-btn" onclick="changePage(1)" style="padding: 8px 15px; cursor: pointer; border: 1px solid #ccc; background: white; border-radius: 5px;">Next</button>
                </div>
            </div>

            <div style="flex: 1;">
                <h3>Live Activity Feed</h3>
                <div id="log-feed" style="background: white; padding: 15px; border-radius: 10px; height: 400px; overflow-y: auto;">
                    <p style="color: #999;">Waiting for scans...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentPage = 1;

        function handleSearch() {
            currentPage = 1;
            refreshData();
        }

        function refreshData() {
            const searchQuery = document.getElementById('search-input').value;
            
            fetch(`http://127.0.0.1:5000/api/dashboard?page=${currentPage}&search=${encodeURIComponent(searchQuery)}`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById('stat-count').innerText = data.user_count;
                    document.getElementById('stat-time').innerText = "Last update: " + data.last_update;
                    
                    const feed = document.getElementById('log-feed');
                    feed.innerHTML = data.recent_logs.slice().reverse().map(log => 
                        `<div style="border-bottom: 1px solid #eee; padding: 5px 0;">
                            <strong>${log.name}</strong> <small style="color: #666;">at ${log.time}</small>
                        </div>`
                    ).join('') || "No recent activity";

                    const table = document.getElementById('user-table');
                    
                    if (data.users.length === 0) {
                        table.innerHTML = `<tr><td colspan="3" style="text-align:center; padding: 20px; color: #888;">No users found.</td></tr>`;
                    } else {
                        table.innerHTML = data.users.map(user => `
                            <tr>
                                <td><strong>${user.user_id}</strong></td>
                                <td>${user.date}</td>
                                <td>
                                    <button 
                                        onclick="deleteUser('${user.user_id}')" 
                                        style="color: #e74a3b; border: 1px solid #e74a3b; padding: 5px 10px; border-radius: 4px; background: white; cursor: pointer;"
                                    >
                                        Delete
                                    </button>
                                </td>
                            </tr>
                        `).join('');
                    }

                    document.getElementById('page-indicator').innerText = data.match_count !== undefined 
                        ? `Page ${data.current_page} (Matches: ${data.match_count})` 
                        : `Page ${data.current_page}`;
                    
                    const prevBtn = document.getElementById('prev-btn');
                    const nextBtn = document.getElementById('next-btn');
                    
                    prevBtn.disabled = data.current_page === 1;
                    prevBtn.style.opacity = data.current_page === 1 ? '0.5' : '1';
                    prevBtn.style.cursor = data.current_page === 1 ? 'not-allowed' : 'pointer';

                    nextBtn.disabled = !data.has_next;
                    nextBtn.style.opacity = !data.has_next ? '0.5' : '1';
                    nextBtn.style.cursor = !data.has_next ? 'not-allowed' : 'pointer';
                })
                .catch(err => console.error("Error fetching dashboard data:", err));
        }

        function changePage(direction) {
            currentPage += direction;
            refreshData(); 
        }

        function deleteUser(userId) {
            if (!confirm(`Are you sure you want to delete ${userId}? This cannot be undone.`)) return;

            fetch('http://127.0.0.1:5000/api/delete_user', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: userId })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    refreshData(); 
                } else {
                    alert("Error: " + data.message);
                }
            })
            .catch(err => console.error("Delete request failed:", err));
        }

        setInterval(refreshData, 5000);
        refreshData();
    </script>
</body>
</html>
