<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Face Verification</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; display: flex; background-color: #f4f4f9; margin: 0; }
        .sidebar { width: 250px; background: #1a1a2e; color: white; height: 100vh; padding: 20px; position: fixed; box-sizing: border-box; }
        .sidebar h2 { color: #4e73df; margin-top: 0; }
        .nav-item { padding: 15px; cursor: pointer; border-radius: 5px; margin-bottom: 5px; transition: 0.2s;}
        .nav-item:hover { background: #252545; }
        
        .main { flex: 1; margin-left: 300px; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #333; margin-top: 0; }
        
        #video-container {
            border: 4px solid #ddd; border-radius: 6px; overflow: hidden;
            background-color: #000; margin-bottom: 20px; position: relative; width: 640px;
        }
        video { display: block; width: 640px; height: 480px; }
        
        #scanning-indicator {
            position: absolute; top: 10px; right: 10px;
            background-color: rgba(0, 0, 0, 0.7); color: #00ffff;
            padding: 5px 10px; border-radius: 5px; font-size: 14px; font-weight: bold;
        }
        
        #result-box {
            padding: 15px; border-radius: 5px; width: 320px; text-align: center;
            font-weight: bold; font-size: 18px; background-color: #e2e3e5; 
            color: #383d41; border: 1px solid #d6d8db;
        }
        .success { background-color: #d4edda !important; color: #155724 !important; border-color: #c3e6cb !important; }
        .failure { background-color: #f8d7da !important; color: #721c24 !important; border-color: #f5c6cb !important; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>FaceID Admin</h2>
        <div class="nav-item" style="background: #252545;">🏠 Live Camera</div>
        <div class="nav-item" onclick="location.href='register.html'">👤 Register User</div>
        <div class="nav-item" onclick="location.href='dashboard.html'">📊 Dashboard</div>
    </div>

    <div class="main">
        <h1>Live Face Verification</h1>

        <div id="video-container">
            <video id="webcam" autoplay playsinline></video>
            <div id="scanning-indicator">Waiting for Blink...</div>
        </div>

        <div id="result-box">Prove you are human. Please blink.</div>
    </div>

    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvas = document.getElementById('canvas');
        const resultBox = document.getElementById('result-box');
        const indicator = document.getElementById('scanning-indicator');

        // Blink Detection Variables
        const BLINK_THRESHOLD = 0.22; 
        let isEyesClosed = false;
        let isProcessing = false; 

        function euclideanDistance(p1, p2) {
            return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
        }

        function calculateEAR(landmarks, eyeIndices) {
            const p1 = landmarks[eyeIndices[0]];
            const p2 = landmarks[eyeIndices[1]];
            const p3 = landmarks[eyeIndices[2]];
            const p4 = landmarks[eyeIndices[3]];
            const p5 = landmarks[eyeIndices[4]];
            const p6 = landmarks[eyeIndices[5]];

            const vertical1 = euclideanDistance(p2, p6);
            const vertical2 = euclideanDistance(p3, p5);
            const horizontal = euclideanDistance(p1, p4);

            return (vertical1 + vertical2) / (2.0 * horizontal);
        }

        const faceMesh = new FaceMesh({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
        }});

        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        faceMesh.onResults((results) => {
            if (isProcessing || !results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) {
                return; 
            }

            const landmarks = results.multiFaceLandmarks[0];

            const leftEyeIndices = [33, 160, 158, 133, 153, 144];
            const rightEyeIndices = [362, 385, 387, 263, 373, 380];

            const leftEAR = calculateEAR(landmarks, leftEyeIndices);
            const rightEAR = calculateEAR(landmarks, rightEyeIndices);
            const averageEAR = (leftEAR + rightEAR) / 2.0;

            // BLINK LOGIC
            if (averageEAR < BLINK_THRESHOLD) {
                isEyesClosed = true;
            } else if (averageEAR > BLINK_THRESHOLD && isEyesClosed) {
                isEyesClosed = false;
                triggerVerification();
            }
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await faceMesh.send({image: videoElement});
            },
            width: 640,
            height: 480
        });
        camera.start();

        function triggerVerification() {
            isProcessing = true;
            indicator.innerText = "Verifying Identity...";
            indicator.style.color = "#ffeb3b";
            resultBox.className = '';
            resultBox.innerHTML = "Blink detected! Checking database...";

            const context = canvas.getContext('2d');
            context.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
            const imageData = canvas.toDataURL('image/jpeg');

            // EXACT BACKEND API URL ADDED HERE
            fetch('http://127.0.0.1:5000/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: imageData })
            })
            .then(response => response.json())
            .then(data => {
                if (data.match) {
                    resultBox.className = 'success';
                    resultBox.innerHTML = `<div style="font-size: 22px;">✅ ${data.name}</div>
                    <div style="font-size: 14px; margin-top: 5px;">Liveness Confirmed</div>`;
                } else {
                    resultBox.className = 'failure';
                    resultBox.innerHTML = `❌ ${data.message}`;
                }
            })
            .catch(error => {
                console.error("Server error:", error);
                resultBox.className = 'failure';
                resultBox.innerHTML = "⚠️ Lost connection to server.";
            })
            .finally(() => {
                // Wait 3 seconds before allowing another scan
                setTimeout(() => {
                    isProcessing = false;
                    indicator.innerText = "Waiting for Blink...";
                    indicator.style.color = "#00ffff";
                    resultBox.className = '';
                    resultBox.innerHTML = "Prove you are human. Please blink.";
                }, 3000);
            });
        }
    </script>
</body>
</html>
